<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 240">
  <style><![CDATA[
    .bg      { fill: #1c1917; }
    .panel   { fill: #292524; rx: 8; }
    .eyebrow { font-family: "Optima", "Optima Nova", "URW Classico", sans-serif; font-size: 9px; font-weight: 700; fill: #a8a29e; letter-spacing: 2px; }
    .quote   { font-family: "Optima", "Optima Nova", "URW Classico", sans-serif; font-size: 22px; font-weight: 400; fill: #fafaf9; }
    .attr    { font-family: "Optima", "Optima Nova", "URW Classico", sans-serif; font-size: 12px; font-weight: 700; fill: #d6d3d1; }
    .label   { font-family: "Optima", "Optima Nova", "URW Classico", sans-serif; font-size: 8.5px; fill: #78716c; letter-spacing: 1px; }
  ]]></style>
  <rect class="bg" width="420" height="240"/>
  <rect class="panel" x="24" y="24" width="372" height="192" rx="8" fill="#292524"/>
  <text x="46" y="62" class="eyebrow">TYPOGRAPHY</text>
