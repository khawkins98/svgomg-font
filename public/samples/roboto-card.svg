    .p { font-family: Roboto-Regular; font-size: 12px; fill: #707070; }
    .stat { font-family: Roboto-Bold; font-size: 32px; fill: #ed8b00; }
  ]]></style>
  <!-- Mimics the deprecated SVG-font glyph block some editors emit. -->
  <font horiz-adv-x="2048"><font-face units-per-em="2048" class="placeholder"/></font>
  <rect class="bg" width="400" height="60"/>
