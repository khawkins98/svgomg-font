  <text x="20" y="38" class="h" fill="#fff">Search &amp; Subscribers</text>
  <text x="20" y="110" class="stat">212M</text>
  <text x="20" y="130" class="h">Google Search impressions</text>
  <text x="20" y="148" class="p">PreventionWeb alone</text>
  <text x="20" y="190" class="stat">429,844</text>
