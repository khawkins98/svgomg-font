<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220" role="img" aria-label="SVGOMG-Font — Stop shipping SVGs with broken text">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0f2e"/>
      <stop offset="100%" stop-color="#3b1f80"/>
    </linearGradient>
    <linearGradient id="accent-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="900" height="220" rx="14" fill="url(#bg-grad)"/>

  <!-- decorative wave shapes -->
  <path d="M0,160 C150,130 300,180 450,150 C600,120 750,165 900,145 L900,220 L0,220 Z" fill="rgba(255,255,255,0.04)"/>
  <path d="M0,180 C200,155 400,195 600,170 C750,150 850,178 900,165 L900,220 L0,220 Z" fill="rgba(255,255,255,0.06)"/>

  <!-- accent bar -->
  <rect x="48" y="52" width="4" height="56" rx="2" fill="url(#accent-grad)"/>

  <!-- main title -->
  <text x="66" y="88" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="46" font-weight="700" letter-spacing="-1" fill="white">SVGOMG</text>
  <text x="330" y="88" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="46" font-weight="700" letter-spacing="-1" fill="#a78bfa">-Font</text>

  <!-- tagline -->
  <text x="66" y="124" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="19" fill="rgba(255,255,255,0.72)">Stop shipping SVGs with broken text.</text>

  <!-- pill badge -->
  <rect x="66" y="148" width="185" height="28" rx="14" fill="rgba(124,58,237,0.35)" stroke="rgba(167,139,250,0.45)" stroke-width="1"/>
  <text x="153" y="167" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="13" font-weight="500" fill="#d4b8ff" text-anchor="middle">Runs entirely in your browser</text>

  <!-- small decorative SVG icon on right -->
  <g transform="translate(740, 50)" opacity="0.18">
    <rect width="120" height="120" rx="18" fill="none" stroke="white" stroke-width="3"/>
    <text x="60" y="68" font-family="monospace" font-size="22" font-weight="700" fill="white" text-anchor="middle">&lt;svg&gt;</text>
    <text x="60" y="95" font-family="monospace" font-size="13" fill="rgba(255,255,255,0.7)" text-anchor="middle">@font-face</text>
  </g>
</svg>
